name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    # bash is available on all three GitHub-hosted runners (Git Bash on
    # Windows), so the same step commands behave identically everywhere.
    shell: bash

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Test on the three OSes naja-scope claims to support. najaeda ships
        # wheels for each (macOS arm64, win_amd64, manylinux) on these Pythons.
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          # pulls najaeda>=0.7.8 (the in-engine intent link) and mcp from PyPI
          pip install -e . pytest

      - name: Run tests
        # The CVA6 regressions self-skip without a local snapshot (absent on
        # CI); the fast structural + intent + snapshot suite runs.
        run: pytest -q
