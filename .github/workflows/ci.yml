name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    # bash is available on all three GitHub-hosted runners (Git Bash on
    # Windows), so the same step commands behave identically everywhere.
    shell: bash

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # 3.15-dev is a forward-looking canary: najaeda has no cp315 wheel yet, so
    # the install step fails until the next najaeda ships one. allow-failure so
    # it surfaces readiness without ever blocking CI. Promote to a real matrix
    # entry (and drop this) once najaeda publishes cp315 wheels.
    continue-on-error: ${{ matrix.python-version == '3.15-dev' }}
    strategy:
      fail-fast: false
      matrix:
        # Test on the three OSes naja-scope claims to support. najaeda ships
        # wheels for each (macOS arm64, win_amd64, manylinux) on these Pythons.
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15-dev"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          # pulls najaeda>=0.7.13 (ships cp314 wheels too) and mcp from PyPI
          pip install -e . pytest

      - name: Run tests
        # The CVA6 regressions self-skip without a local snapshot (absent on
        # CI); the fast structural + intent + snapshot suite runs.
        run: pytest -q

      - name: Run the bundled example scripts
        # Smoke-tests the exact commands examples/README.md documents (not
        # just the answers pytest pins) -- these are small and self-contained
        # (no external clone), so they run on every OS/Python combo. The CVA6
        # demo has its own external-clone dependency and runs in a separate
        # workflow (cva6-demo.yml), not here.
        run: |
          python examples/walkthrough.py
          python examples/gate_level.py
