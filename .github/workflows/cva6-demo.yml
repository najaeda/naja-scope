name: CVA6 demo

# Runs the naja-scope demo/regression against a real production core (CVA6),
# cloned fresh at a pinned tag (examples/cva6_demo.sh -> examples/cva6_demo.py).
# MCP-only, no agent — deterministic, no API cost.
#
# Runs on PRs as well as pushes to main: it depends on an external clone
# (github.com/openhwgroup/cva6 + its hpdcache/cvfpu submodules) and takes a
# few minutes, so it is slower than the rest of CI, but catching a real-core
# regression before merge is worth the wait.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: cva6-demo-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  demo:
    name: cva6 demo (regress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install naja-scope
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run the CVA6 demo (clones CVA6 at a pinned tag, MCP-only, no agent)
        run: ./examples/cva6_demo.sh
