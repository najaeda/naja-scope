name: Publish

# Pure-Python publish pipeline, modeled on naja's wheels.yml but without the
# cibuildwheel matrix (naja-scope ships a single py3-none-any wheel):
#   - build sdist + wheel once and twine-check them
#   - on push to main / manual run: upload to TestPyPI (skip-existing)
#   - on a v* tag: upload the release to PyPI
on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  test-pypi:
    name: Upload to TestPyPI
    needs: build
    if: github.repository == 'najaeda/naja-scope' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # enables trusted publishing if a TestPyPI publisher is configured
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          # Trusted publishing (OIDC) — no long-lived token. Requires a
          # TestPyPI trusted publisher configured for this repo/workflow with
          # environment name `pypi` (https://test.pypi.org/manage/account/publishing/).
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  pypi:
    name: Upload release to PyPI
    needs: test-pypi
    if: github.repository == 'najaeda/naja-scope' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          skip-existing: true
