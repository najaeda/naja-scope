[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "naja-scope"
version = "0.1.0"
description = "Agent-facing MCP query layer over najaeda: navigate elaborated SystemVerilog designs without loading source into context."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
dependencies = [
    "najaeda>=0.7.7",
    "mcp>=1.2",
]

[project.optional-dependencies]
# Phase-2 living-intent layer (get_intent): a separate pyslang re-elaboration,
# warm-only and optional — the structural tools degrade gracefully without it
# (intent.py imports pyslang lazily). naja's slang is plain upstream master, so
# the released PyPI pyslang is close enough for declaration-level queries; see
# docs/phase2-plan.md §4.
intent = ["pyslang>=11"]

[project.scripts]
naja-scope-mcp = "naja_scope.server:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
